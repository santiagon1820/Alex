<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Garantías</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/garantias_admin.css" />
  </head>
  <body>
    <header>
      <a href="/panel" class="header-styles">
        <div class="header-brand">
          <span class="dot"></span>
          <span class="header-link">MGLAB</span>
        </div>
      </a>
    </header>

    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div style="display: flex; align-items: center; gap: 8px">
            <span class="sidebar-title">Garantías</span>
          </div>
        </div>

        <div class="filter-bar">
          <button class="filter-btn" id="filterAll" onclick="setFilter('all')">
            Todos
          </button>
          <button
            class="filter-btn active"
            id="filterOpen"
            onclick="setFilter('open')"
          >
            Abiertos
          </button>
          <button
            class="filter-btn"
            id="filterClosed"
            onclick="setFilter('closed')"
          >
            Cerrados
          </button>
        </div>

        <div class="tickets-list" id="ticketsList">
          <div class="empty-state">
            <div class="spinner" style="margin: 0 auto"></div>
          </div>
        </div>

        <div class="sidebar-actions">
          <button class="btn-refresh" onclick="loadTickets()">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path
                d="M10.5 2a5 5 0 11-8.66 2.5M1 2l.5 2.5L4 4"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Actualizar garantías
          </button>
        </div>
      </aside>

      <main class="main" id="mainArea">
        <div class="no-ticket">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect
              x="6"
              y="10"
              width="36"
              height="28"
              rx="4"
              stroke="currentColor"
              stroke-width="2"
            />
            <path
              d="M14 20h20M14 26h12"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
          <p>Selecciona una garantía para ver la conversación</p>
        </div>
      </main>
    </div>

    <div class="toast" id="toastContainer"></div>
    <input
      type="file"
      id="fileInput"
      multiple
      onchange="handleFileSelect(event)"
    />

    <script src="/js/garantias_admin.js"></script>
  </body>
</html>
