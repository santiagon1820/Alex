<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Soporte</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/ticket_user.css" />
  </head>
  <body>
    <header>
      <a href="/panel" class="header-styles">
        <div class="header-brand">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#1d4ed8"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          <span class="header-link">MGLAB</span>
        </div>
      </a>
    </header>

    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div style="display: flex; align-items: center; gap: 8px">
            <span class="sidebar-title">Mis tickets</span>
          </div>
          <button class="btn-new" onclick="openNewModal()">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
              <path
                d="M6 1v10M1 6h10"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
            Nuevo
          </button>
        </div>

        <div class="filter-bar">
          <button class="filter-btn" id="filterAll" onclick="setFilter('all')">
            Todos
          </button>
          <button
            class="filter-btn active"
            id="filterOpen"
            onclick="setFilter('open')"
          >
            Abiertos
          </button>
          <button
            class="filter-btn"
            id="filterClosed"
            onclick="setFilter('closed')"
          >
            Cerrados
          </button>
        </div>

        <div class="tickets-list" id="ticketsList">
          <div class="empty-state">
            <div class="spinner" style="margin: 0 auto"></div>
          </div>
        </div>

        <div class="sidebar-actions">
          <button class="btn-refresh" onclick="loadTickets()">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path
                d="M10.5 2a5 5 0 11-8.66 2.5M1 2l.5 2.5L4 4"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Actualizar tickets
          </button>
        </div>
      </aside>

      <main class="main" id="mainArea">
        <div class="no-ticket">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect
              x="6"
              y="10"
              width="36"
              height="28"
              rx="4"
              stroke="currentColor"
              stroke-width="2"
            />
            <path
              d="M14 20h20M14 26h12"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
          <p>Selecciona un ticket para ver la conversación</p>
        </div>
      </main>
    </div>

    <!-- MODAL NUEVO TICKET -->
    <div class="modal-overlay" id="newModal">
      <div class="modal">
        <div class="modal-title">Crear nuevo ticket</div>
        <div class="form-group">
          <label>Asunto</label>
          <input
            type="text"
            id="modalSubject"
            placeholder="Describe el motivo del ticket"
          />
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeNewModal()">Cancelar</button>
          <button class="btn-confirm" onclick="createTicket()">
            Crear ticket
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toastContainer"></div>
    <input
      type="file"
      id="fileInput"
      multiple
      onchange="handleFileSelect(event)"
    />

    <script src="/js/tickets_user.js"></script>
  </body>
</html>
